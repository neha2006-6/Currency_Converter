<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #5adad3, #6251c2);
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
      box-shadow: 16px 18px 8px rgba(26, 19, 19, 0.2);
    }
    input, select, button {
      padding: 10px;
      margin: 10px 0;
      width: 90%;
      font-size: 16px;
    }
    button {
      background: #5adad3;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #72c0ec;
    }
    #result {
      font-size: 20px;
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2> Currency Converter 💱</h2>
    <input type="number" id="amount" placeholder="Enter amount in USD">
    
    <select id="currency">
      <option value="inr">Convert to INR</option>
      <option value="eur">Convert to EUR</option>
    </select>
    
    <button onclick="convertCurrency()">Convert</button>
    
    <div id="result">Result will appear here</div>
  </div>

  <script>
    function convertCurrency() {
      let amount = document.getElementById("amount").value;
      let currency = document.getElementById("currency").value;
      let result = 0;

      if (currency === "inr") {
        result = amount * 83; // Example rate: 1 USD = 83 INR
        document.getElementById("result").innerText = amount + " USD = " + result.toFixed(2) + " INR";
      } else if (currency === "eur") {
        result = amount * 0.92; // Example rate: 1 USD = 0.92 EUR
        document.getElementById("result").innerText = amount + " USD = " + result.toFixed(2) + " EUR";
      }
    }
  </script>

</body>
</html>
